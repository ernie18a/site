baseURL: "https://ernie18a.github.io/site/"
locale: "zh-TW"
title: "My Site"
theme: PaperMod
paginate: 10
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: My Site
  description: "My personal site"
  author: ernie18a

  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    # favicon & logo: place files under static/images/site/
    favicon: "/images/site/favicon.ico"
    favicon16x16: "/images/site/favicon-16x16.png"
    favicon32x32: "/images/site/favicon-32x32.png"
    apple_touch_icon: "/images/site/apple-touch-icon.png"
    safari_pinned_tab: "/images/site/safari-pinned-tab.svg"

  label:
    text: "Home"
    icon: /images/site/logo.svg
    iconHeight: 35

  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: Welcome to my site

  socialIcons:
    - name: github
      url: "https://github.com/ernie18a"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/ernie18a/site/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: Search
      url: /search/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON   # required for search

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai
